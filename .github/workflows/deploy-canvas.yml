name: Deploy Canvas

on:
  push:
    branches: [main]
    paths:
      - "src/components/canvas/**"
      - "src/components/ai-chat/**"
      - "src/components/islands/**"
      - "src/lib/**"
      - "src/stores/**"
      - "src/pages/ai-canvas.astro"
      - "src/pages/api/**"
      - "db/migrations/**"
      - "scripts/build-canvas.js"
      - "astro.config.mjs"
      - "package.json"
      - "bun.lock"
      - "wrangler.canvas.jsonc"
      - ".github/workflows/deploy-canvas.yml"
  workflow_dispatch:

concurrency:
  group: deploy-canvas-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy canvas.rohanjasani.com
    runs-on: ubuntu-latest
    environment: production-canvas
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build canvas target
        run: bun run build:canvas

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy to Cloudflare Pages (canvas)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler --version
          bunx wrangler pages project list
          bunx wrangler pages deploy dist --project-name=ai-canvas
